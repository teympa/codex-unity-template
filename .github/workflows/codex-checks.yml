name: codex-checks

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  unity-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Unity gameplay scripts
        run: python scripts/validate_unity_gameplay.py
